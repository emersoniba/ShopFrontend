<ul class="list-unstyled">

    <li class="dropdown pc-h-item header-user-profile" ngbDropdown>
        <a class="pc-head-link dropdown-toggle arrow-none me-0 d-flex align-items-center" ngbDropdownToggle>
            <div *ngIf="fotoPerfil; else avatarIniciales" class="user-avatar-container">
                <img [src]="fotoPerfil" alt="user-image" class="user-avtar shadow-sm" />
            </div>
            <ng-template #avatarIniciales>
                <div class="user-avtar-iniciales shadow-sm">
                    {{ iniciales }}
                </div>
            </ng-template>
            <span class="fw-bold ms-2">{{ nombreCompleto }}</span>
            <i class="ti ti-chevron-down ms-2 text-muted" style="font-size: 14px;"></i>
        </a>

        <div class="dropdown-menu dropdown-user-profile dropdown-menu-end pc-h-dropdown shadow border-0 mt-2" ngbDropdownMenu>
            
            <div class="dropdown-header px-4 py-3 bg-light border-bottom rounded-top">
                <span class="text-muted small d-block mb-1">Sesión iniciada como</span>
                <div class="d-flex align-items-center">
                    <i class="ti ti-briefcase text-primary me-2"></i>
                    <span class="fw-bold text-dark">{{ cargo }}</span>
                </div>
            </div>

            <div class="p-2">
                <a href="javascript:" class="dropdown-item rounded py-2 mb-1 d-flex align-items-center" (click)="abrirModalPerfil()">
                    <i class="ti ti-user fs-5 text-primary me-2"></i>
                    <span>Mi Perfil</span>
                </a>
                
                <a href="javascript:" class="dropdown-item rounded py-2 d-flex align-items-center">
                    <i class="ti ti-file-invoice fs-5 text-info me-2"></i>
                    <span>Guía rápida</span>
                </a>
                
                <div class="dropdown-divider my-2"></div>
                
                <a href="javascript:" class="dropdown-item rounded py-2 d-flex align-items-center hover-danger" (click)="logout()">
                    <i class="ti ti-power fs-5 me-2"></i>
                    <span class="fw-bold">Salir del Sistema</span>
                </a>
            </div>
        </div>
    </li>
</ul>

<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12">
        <app-card cardTitle="Gestión de Movimientos" blockClass="pc-component">
            <div class="row mb-3">
                <div class="col-lg-6 col-md-6 col-sm-12">
                    <div class="d-flex flex-wrap align-items-center gap-2">
                        <div class="search-box position-relative">
                            <i class="ti ti-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                            <input 
                                type="text" 
                                class="form-control ps-5" 
                                placeholder="Buscar comprobante..." 
                                [formControl]="searchControl"
                                style="min-width: 250px;">
                        </div>

                        <div class="col-lg-6 col-md-6 col-sm-12 pull-right mb-2">
                            <button mat-button class="btn btn-sm btn-primary btn-round" (click)="accionNuevo()"
                                matTooltip="Nuevo Movimiento">
                                <i class="ti ti-plus"></i>
                                Nuevo Movimiento
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <ag-grid-angular 
                        #agGrid
                        style="width: 100%; height: 600px;" 
                        class="ag-theme-material"
                        [gridOptions]="gridOptions" 
                        [columnDefs]="columnDefs"
                        [rowData]="rowData" 
                        [rowSelection]="rowSelection" 
                        [pagination]="true"
                        [paginationPageSize]="paginationPageSize"
                        [paginationPageSizeSelector]="paginationPageSizeSelector"
                        [paginationNumberFormatter]="paginationNumberFormatter" 
                        [localeText]="localEs"
                        (gridReady)="onGridReady($event)">
                    </ag-grid-angular>

                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="text-muted small">
                            Mostrando {{ (currentPage - 1) * pageSize + 1 }} - 
                            {{ Math.min(currentPage * pageSize, totalItems) }} de {{ totalItems }} movimientos
                        </span>
                    </div>
                </div>
            </div>
        </app-card>
    </div>
</div>

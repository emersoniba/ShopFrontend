<!-- src/app/components/material/material.component.html -->
<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12">
        <app-card cardTitle="Gestión de Inventario" blockClass="pc-component">
            <!-- Barra de herramientas superior -->
            <div class="row mb-3">
                <div class="col-lg-6 col-md-6 col-sm-12">
                    <div class="d-flex flex-wrap align-items-center gap-2">
                        <!-- Búsqueda -->
                        <div class="search-box position-relative">
                            <i class="ti ti-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                            <input 
                                type="text" 
                                class="form-control ps-5" 
                                placeholder="Buscar productos..." 
                                [formControl]="searchControl"
                                style="min-width: 250px;">
                        </div>

                        <!-- Filtro de Categoría -->
                        <select #catSelect class="form-select" style="width: 150px;" 
                                (change)="filtrarPorCategoria(catSelect.value ? +catSelect.value : null)">
                            <option value="">Todas las categorías</option>
                            <option *ngFor="let cat of categorias" [value]="cat.id">
                                {{ cat.nombre }}
                            </option>
                        </select>

                        <!-- Filtro de Tipo -->
                        <select #tipoSelect class="form-select" style="width: 150px;"
                                (change)="filtrarPorTipoProducto(tipoSelect.value ? +tipoSelect.value : null)">
                            <option value="">Todos los tipos</option>
                            <option *ngFor="let tipo of tiposProducto" [value]="tipo.id">
                                {{ tipo.nombre }}
                            </option>
                        </select>

                        <!-- Filtro de Almacén -->
                        <select #almacenSelect class="form-select" style="width: 150px;"
                                (change)="filtrarPorAlmacen(almacenSelect.value ? +almacenSelect.value : null)">
                            <option value="">Todos los almacenes</option>
                            <option *ngFor="let alm of almacenes" [value]="alm.id">
                                {{ alm.nombre }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="col-lg-6 col-md-6 col-sm-12">
                    <div class="d-flex flex-wrap align-items-center justify-content-end gap-2">
                        <!-- Filtros rápidos -->
                        <button class="btn btn-sm btn-outline-warning" 
                                [class.active]="filtroStockBajo"
                                (click)="toggleStockBajo()"
                                matTooltip="Productos con stock bajo">
                            <i class="ti ti-alert-triangle"></i>
                            <span class="d-none d-sm-inline"> Stock Bajo</span>
                        </button>

                        <button class="btn btn-sm btn-outline-danger" 
                                [class.active]="filtroSinStock"
                                (click)="toggleSinStock()"
                                matTooltip="Productos sin stock">
                            <i class="ti ti-circle-x"></i>
                            <span class="d-none d-sm-inline"> Sin Stock</span>
                        </button>

                        <button class="btn btn-sm btn-outline-success" 
                                [class.active]="filtroOfertas"
                                (click)="toggleOfertas()"
                                matTooltip="Productos en oferta">
                            <i class="ti ti-tag"></i>
                            <span class="d-none d-sm-inline"> Ofertas</span>
                        </button>

                        <button class="btn btn-sm btn-outline-info" 
                                [class.active]="filtroActivos"
                                (click)="toggleActivos()"
                                matTooltip="Mostrar activos/inactivos">
                            <i class="ti ti-eye"></i>
                            <span class="d-none d-sm-inline"> Activos</span>
                        </button>

                        <button class="btn btn-sm btn-outline-secondary" 
                                (click)="limpiarFiltros()"
                                matTooltip="Limpiar filtros">
                            <i class="ti ti-x"></i>
                        </button>

                       
                    </div>
                </div>
            </div>

            <!-- Tabla con AG Grid -->
            <div class="row">
                <div class="col-12">
                    <ag-grid-angular 
                        #agGrid
                        style="width: 100%; height: 600px;" 
                        class="ag-theme-material"
                        [gridOptions]="gridOptions" 
                        [columnDefs]="columnDefs"
                        [rowData]="rowData" 
                        [rowSelection]="rowSelection" 
                        [pagination]="true"
                        [paginationPageSize]="paginationPageSize"
                        [paginationPageSizeSelector]="paginationPageSizeSelector"
                        [paginationNumberFormatter]="paginationNumberFormatter" 
                        [localeText]="localEs"
                        (gridReady)="onGridReady($event)">
                    </ag-grid-angular>

                    <!-- Contador de registros -->
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="text-muted small">
                            Mostrando {{ (currentPage - 1) * pageSize + 1 }} - 
                            {{ Math.min(currentPage * pageSize, totalItems) }} de {{ totalItems }} productos
                        </span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-secondary" 
                                    (click)="exportarExcel()"
                                    matTooltip="Exportar a Excel">
                                <i class="ti ti-file-spreadsheet"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" 
                                    (click)="exportarPDF()"
                                    matTooltip="Exportar a PDF">
                                <i class="ti ti-file-pdf"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </app-card>
    </div>
</div>

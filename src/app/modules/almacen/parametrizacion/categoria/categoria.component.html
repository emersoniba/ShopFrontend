<div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12">
        <app-card cardTitle="Categoria" blockClass="pc-component">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 br">
                    <div class="row">
                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <h4><b> <i class="ti ti-package fs-4"></i>Gestión de Categoria de los productos</b></h4>
                        </div>
                        <div class="col-lg-6 col-md-6 col-sm-12 pull-right mb-2">
                            <button mat-button class="btn btn-sm btn-primary btn-round" (click)="accionNuevo()" matTooltip="Nuevo Catálogo">
                                <i class="ti ti-plus"></i>
                                Nueva Categoria
                            </button>
                        </div>
                    </div>
                    <hr class="separator" />
                    <ag-grid-angular style="width: 100%; height: 600px;" class="ag-theme-material" [advancedFilterModel]="" [gridOptions]="gridOptions" [columnDefs]="columnDefs" [rowData]="dataCatalogo" [rowSelection]="rowSelection" [pagination]="true" [paginationPageSize]="paginationPageSize"
                        [paginationPageSizeSelector]="paginationPageSizeSelector" [paginationNumberFormatter]="paginationNumberFormatter" [localeText]="localEs" (gridReady)="onGridReady($event)">
                    </ag-grid-angular>
                </div>
            </div>
        </app-card>
    </div>
</div>

<!-- Envolvemos todo y le pasamos la clase light-theme si es necesario -->
<div class="login-layout" [class.light-theme]="!isDarkMode">
    
    <!-- LADO IZQUIERDO: Branding y Logo -->
    <div class="login-brand d-none d-lg-flex">
        <div class="brand-overlay"></div>
        <div class="brand-content text-center">
            <img src="/assets/images/logo_praga.jpeg" alt="Praga Logo" class="brand-logo shadow-lg">
            <h2 class="mt-4 brand-title fw-light" style="letter-spacing: 2px;">SISTEMA POS & GESTIÓN</h2>
        </div>
    </div>

    <!-- LADO DERECHO: Formulario -->
    <div class="login-form-container">
        
        <!-- NUEVO BOTÓN TOGGLE (Píldora Animada) -->
        <div class="custom-theme-switch" (click)="toggleTheme()" title="Cambiar Tema">
            <div class="switch-track">
                <!-- Sol (Visible en modo claro) -->
                <i class="ti ti-sun icon-sun"></i>
                <!-- Luna (Visible en modo oscuro) -->
                <i class="ti ti-moon icon-moon"></i>
                <!-- El círculo que se mueve -->
                <div class="switch-thumb"></div>
            </div>
        </div>

        <div class="login-form-wrapper">
            
            <!-- Título -->
            <div class="mb-5 text-center text-lg-start">
                <img src="/assets/images/logo_praga.jpeg" alt="Logo" class="logo-mobile d-block d-lg-none mx-auto mb-3">
                <h2 class="fw-bold form-main-title mb-2">Bienvenido de nuevo</h2>
                <p class="form-subtitle">Ingrese sus credenciales para acceder.</p>
            </div>

            <form [formGroup]="formAuth" (ngSubmit)="authLogin()">
                
                <!-- Alertas -->
                <div *ngIf="errorMessage" class="alert alert-danger custom-alert border-0 p-3 mb-4 d-flex align-items-center">
                    <i class="ti ti-alert-circle fs-4 me-3"></i>
                    <div>{{ errorMessage }}</div>
                    <button type="button" class="btn-close btn-close-white ms-auto" (click)="errorMessage = null"></button>
                </div>

                <div *ngIf="remainingAttempts !== null && remainingAttempts > 0 && !errorMessage" class="alert alert-warning custom-alert border-0 p-3 mb-4 d-flex align-items-center">
                    <i class="ti ti-alert-triangle fs-4 me-3"></i>
                    <div>Intentos restantes: {{ remainingAttempts }}</div>
                    <button type="button" class="btn-close btn-close-white ms-auto" (click)="remainingAttempts = null"></button>
                </div>

                <!-- Input Usuario -->
                <div class="form-group mb-4">
                    <label class="form-label custom-label mb-2">Usuario <span class="text-danger">*</span></label>
                    <div class="input-group input-group-lg custom-input-group">
                        <span class="input-group-text custom-icon"><i class="ti ti-user"></i></span>
                        <input type="text" 
                               class="form-control custom-input" 
                               [class.is-invalid]="formAuth.get('username')?.invalid && formAuth.get('username')?.touched"
                               formControlName="username"
                               placeholder="ej. cajero1">
                    </div>
                </div>

                <!-- Input Contraseña -->
                <div class="form-group mb-5">
                    <label class="form-label custom-label mb-2">Contraseña <span class="text-danger">*</span></label>
                    <div class="input-group input-group-lg custom-input-group">
                        <span class="input-group-text custom-icon"><i class="ti ti-lock"></i></span>
                        <input type="password" 
                               class="form-control custom-input" 
                               [class.is-invalid]="formAuth.get('password')?.invalid && formAuth.get('password')?.touched"
                               formControlName="password"
                               placeholder="••••••••">
                    </div>
                </div>

                <!-- Botón -->
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-3 submit-btn" [disabled]="formAuth.invalid || isLoading">
                    <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                    <i *ngIf="!isLoading" class="ti ti-login me-2"></i>
                    {{ isLoading ? 'VERIFICANDO...' : 'INICIAR SESIÓN' }}
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-auto pt-5 text-center custom-footer small">
                <hr class="footer-divider mb-3">
                <p class="mb-1">© {{ fecha }} | Unidad de Desarrollo Tecnológico - UDTI</p>
                <p class="mb-0 fw-bold highlight-footer-text">Praga Disco & Karaoke by Emerson Ibañez</p>
            </div>
            
        </div>
    </div>
</div>
